# SPDX-FileCopyrightText: 2026 Oculux Technologies LLC
#
# cargo-deny configuration — INV-7 (dependency hygiene) and INV-6 (no custom
# crypto) enforcement point. CI fails on advisories, unknown sources, wildcard
# versions, licenses outside the allowlist, and — critically — any attempt to
# depend on a cryptographic-primitive crate from outside libsignal's tree.
#
# LICENSE LEDGER (non-permissive / notable licenses, and why each is accepted):
#   - AGPL-3.0-only : our own tezca-relay, and the libsignal tree (A2). Combined
#     -work implications flagged as work order §10.6 (pre-suite decision).
#   - MPL-2.0 (hpke-rs, hpke-rs-crypto) : inside libsignal's signal-crypto.
#   - MPL-2.0 (uniffi + its 5 sub-crates) : the FFI toolkit (A3). MPL-2.0 is
#     FILE-scoped copyleft; uniffi is consumed UNMODIFIED (no edits to its
#     source), so tezca-core's Apache-2.0 license is unaffected (MPL-2.0 §3.3 /
#     Larger-Work). Scoped below; never allowed globally.
#   - OpenSSL : openssl-src vendored by SQLCipher (locked A4).
#   - CDLA-Permissive-2.0 (webpki-root-certs) : permissive data license for the
#     Mozilla CA bundle used by the TLS client stack; allowed globally.
# TLS: rustls runs on ONE provider — ring (INV-6). aws-lc-rs is banned in
# [bans] so CI fails if any dep pulls the other provider (flag 2a).

[graph]
all-features = true

[advisories]
yanked = "deny"
ignore = [
    # proc-macro-error2 is unmaintained; reaches us transitively via libcrux's
    # hax formal-verification macros inside libsignal's tree. Nothing to fix
    # on our side; revisit on every libsignal bump.
    { id = "RUSTSEC-2026-0173", reason = "transitive via libsignal → libcrux → hax-lib-macros; build-time proc-macro only" },
]

[licenses]
# tezca-core is Apache-2.0 (A10): its dependency tree stays permissive except
# for the explicitly scoped exceptions below. AGPL is allowed ONLY for our own
# crates and the libsignal tree (A2 locked decision; combined-work implications
# are flagged as work order §10.6 — pre-Tezca-suite decision item).
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    # OpenSSL license: openssl-src vendored by SQLCipher (locked A4).
    "OpenSSL",
    # CDLA-Permissive-2.0: webpki-root-certs (Mozilla CA bundle); permissive.
    "CDLA-Permissive-2.0",
]
exceptions = [
    { name = "tezca-relay", allow = ["AGPL-3.0-only"] },
    # The official libsignal Rust tree (A2).
    { name = "libsignal-protocol", allow = ["AGPL-3.0-only"] },
    { name = "libsignal-core", allow = ["AGPL-3.0-only"] },
    { name = "libsignal-debug", allow = ["AGPL-3.0-only"] },
    { name = "signal-crypto", allow = ["AGPL-3.0-only"] },
    { name = "spqr", allow = ["AGPL-3.0-only"] },
    # HPKE used inside signal-crypto; MPL-2.0 is file-scoped copyleft,
    # accepted as a dependency — scoped here, never allowed globally.
    { name = "hpke-rs", allow = ["MPL-2.0"] },
    { name = "hpke-rs-crypto", allow = ["MPL-2.0"] },
    # uniffi FFI toolkit (A3), MPL-2.0, consumed unmodified — see the license
    # ledger above; tezca-core stays Apache-2.0.
    { name = "uniffi", allow = ["MPL-2.0"] },
    { name = "uniffi_core", allow = ["MPL-2.0"] },
    { name = "uniffi_macros", allow = ["MPL-2.0"] },
    { name = "uniffi_meta", allow = ["MPL-2.0"] },
    { name = "uniffi_pipeline", allow = ["MPL-2.0"] },
    { name = "uniffi_internal_macros", allow = ["MPL-2.0"] },
]

[[licenses.clarify]]
# ring ships a composite LICENSE; standard cargo-deny clarification. Present
# for when/if ring enters the tree (INV-6 names it as an approved crate).
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Tightened from "warn" 2026-07-16 (maintainer-directed after PR #17):
# duplicate versions now FAIL CI unless recorded as deliberate below, so
# every future duplication is an explicit decision, not silent drift.
multiple-versions = "deny"
# Each skip names one stale version, its provenance (cargo tree -i), and why
# it cannot converge yet. Revisit on the parent crate's next bump.
# All skips are VERSION-PINNED (maintainer condition, 2026-07-16): no
# skip-tree, so any FUTURE duplicate — even under an already-skipped parent —
# fails CI and gets its own deliberate entry here.
skip = [
    # §10.2 LOCKSTEP — DO NOT DEDUP INDEPENDENTLY: libsignal's RustCrypto
    # trait chain (crypto-common/aead) is still on rand_core 0.6. This dupe
    # exists BECAUSE of the coupled-dependency rule; converging it means
    # bumping libsignal's side, which moves only with a libsignal bump
    # verified against the RNG trait bounds (§10.2 ledger).
    { name = "rand_core", version = "=0.6.4" },
    # §10.2 LOCKSTEP — DO NOT DEDUP INDEPENDENTLY: rand_core 0.6.4's
    # OS-entropy backend, pinned by the same libsignal chain as above.
    { name = "getrandom", version = "=0.2.17" },
    # tungstenite 0.30's internal masking/handshake RNG chain (rand 0.10 →
    # rand_core 0.10 → getrandom 0.4), pinned entry per link. Shares NO
    # types with libsignal's API; the libsignal-coupled workspace rand
    # stays 0.9 (§10.2).
    { name = "rand", version = "=0.10.2" },
    { name = "rand_core", version = "=0.10.1" },
    { name = "getrandom", version = "=0.4.3" },
    # axum 0.8 bundles its own tokio-tungstenite/tungstenite 0.29 pair for
    # the relay's server-side WS; the workspace client stack is on 0.30.
    # Converges when axum bumps its WS dependency.
    { name = "tokio-tungstenite", version = "=0.29.0" },
    { name = "tungstenite", version = "=0.29.0" },
    # petgraph 0.8 → prost-build (libsignal build-deps): hashbrown 0.15 and
    # its foldhash 0.1 trail the workspace 0.17/0.2 tree.
    { name = "hashbrown", version = "=0.15.5" },
    { name = "foldhash", version = "=0.1.5" },
    # rusqlite 0.40's wasm VFS chain (sqlite-wasm-rs, non-Android target)
    # trails the workspace hashbrown 0.17.
    { name = "hashbrown", version = "=0.16.1" },
    # prost-build (libsignal build-deps) trails libsignal's own 0.15 direct.
    { name = "itertools", version = "=0.14.0" },
    # tungstenite 0.30 moved to sha1 0.11; axum's WS stack and libsignal's
    # signal-crypto remain on 0.10 (both remain INV-6 wrapper-listed above).
    # sha1 0.11 drags the RustCrypto 0.11-generation base traits alongside
    # libsignal's 0.10 generation — one pinned entry per link (previously
    # absorbed silently by the skip-tree this ledger replaced):
    { name = "sha1", version = "=0.11.0" },
    { name = "digest", version = "=0.11.3" },
    { name = "block-buffer", version = "=0.12.1" },
    { name = "crypto-common", version = "=0.2.2" },
    # rand 0.10's chacha core (chacha20 0.10) pulls cpufeatures 0.3;
    # libsignal's stack is on 0.2.
    { name = "cpufeatures", version = "=0.3.0" },
    # Non-Linux transitive splits (Windows / UEFI targets in the lockfile).
    { name = "windows-sys", version = "=0.52.0" },
    { name = "r-efi", version = "=5.3.0" },
]
wildcards = "deny"
# Our own unpublished workspace crates are consumed by path (no version);
# registry wildcards remain denied. Maintainer-approved 2026-07-14.
allow-wildcard-paths = true

# ---------------------------------------------------------------------------
# INV-6 MECHANICAL ENFORCEMENT: cryptographic primitive crates may exist in
# the graph ONLY as direct dependencies of the wrapper crates listed with
# them (libsignal's tree and RustCrypto-internal composition). Adding any of
# these as a dependency of tezca-* code fails CI. Extending a wrappers list
# or adding a new primitive requires explicit approval by the maintainer,
# with an approval note in the PR.
# ---------------------------------------------------------------------------
deny = [
    { name = "aes", wrappers = ["aes-gcm-siv", "cbc", "ctr", "libsignal-protocol", "signal-crypto"] },
    { name = "aes-gcm", wrappers = [] },
    { name = "aes-gcm-siv", wrappers = ["libsignal-protocol"] },
    { name = "ctr", wrappers = ["aes-gcm-siv", "libsignal-protocol", "signal-crypto"] },
    { name = "cbc", wrappers = ["signal-crypto"] },
    { name = "chacha20poly1305", wrappers = [] },
    # sha1: RFC 6455 REQUIRES SHA-1 for the WebSocket opening handshake
    # (Sec-WebSocket-Accept). Protocol framing mandated by the standard, not a
    # cryptographic choice of ours — no confidentiality/integrity property of
    # Titlan rests on it. Maintainer-approved 2026-07-14 for the WS handshake
    # (test client + relay server) and pre-existing for the libsignal tree.
    # Each wrapper below is a genuine DIRECT parent of sha1 (cargo tree -i
    # sha1); the list is exactly those parents — remove one and cargo-deny
    # errors. No entry is here to broaden the allowlist.
    { name = "sha1", wrappers = [
        "axum",          # relay server-side RFC 6455 WS handshake
        "tungstenite",   # test WS client; also sha1's direct parent under axum's tokio-tungstenite
        "signal-crypto", # libsignal-internal (audited tree), NOT WebSocket
    ] },
    { name = "sha2", wrappers = ["curve25519-dalek", "hkdf", "hmac", "libsignal-core", "libsignal-protocol", "signal-crypto", "spqr"] },
    { name = "md-5", wrappers = ["hmac", "uuid"] },
    { name = "hmac", wrappers = ["hkdf", "libsignal-protocol", "signal-crypto", "spqr"] },
    { name = "hkdf", wrappers = ["libsignal-protocol", "signal-crypto", "spqr"] },
    { name = "pbkdf2", wrappers = [] },
    { name = "argon2", wrappers = [] },
    { name = "curve25519-dalek", wrappers = ["libsignal-core", "libsignal-protocol", "spqr", "x25519-dalek"] },
    { name = "x25519-dalek", wrappers = ["libsignal-core"] },
    { name = "ed25519-dalek", wrappers = [] },
    { name = "rsa", wrappers = [] },
    { name = "libcrux-ml-kem", wrappers = ["libsignal-protocol", "spqr"] },
    { name = "hpke-rs", wrappers = ["signal-crypto"] },
    # Single-TLS-provider policy (Phase 4a flag 2a): rustls runs on **ring**
    # across the whole tree (INV-6 names ring). aws-lc-rs is the other rustls
    # provider and must NEVER enter — the Phase 4a client stack (reqwest,
    # tokio-tungstenite) will be configured with a ring-backed rustls, and
    # this ban mechanically enforces "one provider, ring" the moment those
    # deps land in green. No wrappers: aws-lc has no legitimate parent here.
    { name = "aws-lc-rs", wrappers = [] },
    { name = "aws-lc-sys", wrappers = [] },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[sources.allow-org]
# The libsignal tree is git-only (pinned tags, revs sealed in Cargo.lock):
# signalapp/libsignal, signalapp/curve25519-dalek (their audited dalek fork,
# mirrored in [patch.crates-io]), signalapp/SparsePostQuantumRatchet.
github = ["signalapp"]
