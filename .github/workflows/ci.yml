#
# CI per work order §6: build, clippy (deny warnings), rustfmt, cargo
# audit/deny (INV-6/INV-7 enforcement), Android lint, unit + integration
# tests, envelope fuzzing (cargo-fuzz), coverage floor (§8: ≥80% lines on
# tezca-core), double-build reproducibility, and SBOM generation (validated
# on every push; published as release artifacts by release.yml on tags).

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # libsignal's build.rs compiles protobuf definitions.
  PROTOC_APT: protobuf-compiler

jobs:
  invariants:
    name: Repo invariants (SPDX, appId, naming)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: ./scripts/check-invariants.sh

  rust:
    name: Rust — fmt, clippy, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y $PROTOC_APT
      # rustup reads the pinned toolchain from rust-toolchain.toml
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo build --workspace --locked
      - run: cargo test --workspace --locked
      # The flat-memory acceptance test (§6 Phase 3) is RSS-sensitive and is
      # #[ignore]d in the concurrent run above; run it alone, single-threaded.
      - run: cargo test -p tezca-relay --test relay_lifecycle --locked memory_stays_flat_under_sustained_load -- --ignored --exact --test-threads=1

  rust-supply-chain:
    name: Rust — cargo deny + audit (INV-6/INV-7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-audit
      - run: cargo audit

  fuzz:
    name: Fuzz — envelope + relay parsers (INV-4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y $PROTOC_APT
      - run: rustup toolchain install nightly-2026-07-14 --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            tezca-core/fuzz
            tezca-relay/fuzz
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-fuzz
      - name: Fuzz outer envelope parser
        working-directory: tezca-core
        run: cargo +nightly-2026-07-14 fuzz run envelope_parse -- -max_total_time=90
      - name: Fuzz inner frame parser
        working-directory: tezca-core
        run: cargo +nightly-2026-07-14 fuzz run inner_parse -- -max_total_time=90
      - name: Fuzz relay deposit-admission parser
        working-directory: tezca-relay
        run: cargo +nightly-2026-07-14 fuzz run deposit_admissible -- -max_total_time=90
      - name: Fuzz relay ack-frame parser
        working-directory: tezca-relay
        run: cargo +nightly-2026-07-14 fuzz run ack_frame -- -max_total_time=90
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: fuzz-artifacts
          path: |
            tezca-core/fuzz/artifacts/
            tezca-relay/fuzz/artifacts/
          retention-days: 30

  relay-hardening:
    name: Relay — systemd unit hardening (INV-3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # `systemd-analyze verify` resolves the unit's ExecStart and exits
      # non-zero when the referenced binary is absent — deterministically, on
      # every run. The relay binary is deployed separately and isn't present in
      # CI, so this job had been failing since it was introduced. Install a stub
      # at the ExecStart path so verify checks the hardening DIRECTIVES (no-swap
      # / no-core-dump / read-only) — its actual purpose — without tripping on
      # the absent binary.
      - run: sudo install -m 0755 /dev/stdin /usr/local/bin/tezca-relay <<< '#!/bin/sh'
      - run: systemd-analyze verify --recursive-errors=no deploy/tezca-relay.service

  coverage:
    name: Coverage — tezca-core ≥ 80% lines (§8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y $PROTOC_APT
      - run: rustup toolchain install && rustup component add llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-llvm-cov
      # Instrument exactly the tests the §8 gate measures: tezca-core's own
      # suites, plus tezca-relay's relay_client_e2e (it drives tezca-core's
      # relay client end-to-end — the reason `-p tezca-core` alone left
      # relay_client/ at ~0%). The relay-only acceptance suites (limits,
      # zero_knowledge, relay_lifecycle) are deliberately NOT run here: they
      # contribute nothing to the gated report (tezca-relay/src is filtered —
      # phantom 0%, its children are SIGKILLed before profile flush; its real
      # gate is the `rust` job) and their hand-rolled-HTTP harness is
      # connection-flaky under parallel load (CI #34).
      - run: cargo llvm-cov --no-report -p tezca-core --locked
      - run: cargo llvm-cov --no-report -p tezca-relay --test relay_client_e2e --locked
      - run: cargo llvm-cov report --locked --ignore-filename-regex 'tezca-relay/src/' --fail-under-lines 80

  android:
    name: Android — lint, unit tests, assemble
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: titlan-android
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      # 4b-1 green: the app build cross-compiles tezca-core (cargo-ndk) and
      # generates the UniFFI bindings, so the Android jobs need the Rust
      # toolchain, the Android targets, and the pinned NDK.
      - run: sudo apt-get update && sudo apt-get install -y $PROTOC_APT
        working-directory: .
      - run: rustup toolchain install && rustup target add aarch64-linux-android x86_64-linux-android
        working-directory: .
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-ndk
      - run: sdkmanager "ndk;28.2.13676358"
        working-directory: .
      - run: ./gradlew --no-daemon :app:lintDebug :app:testDebugUnitTest :app:assembleDebug

  android-instrumented:
    name: Android — instrumented (Keystore wrap, INV-1 at-rest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      # Native toolchain for the tezca-core cross-compile (see android job).
      - run: sudo apt-get update && sudo apt-get install -y $PROTOC_APT
      - run: rustup toolchain install && rustup target add aarch64-linux-android x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-ndk
      - run: sdkmanager "ndk;28.2.13676358"
      - name: Enable KVM for the emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          disable-animations: true
          working-directory: titlan-android
          script: ./gradlew --no-daemon :app:connectedDebugAndroidTest
      # Backup posture check runs even when the instrumented suite is red
      # (if: always()) so both red signals stay visible on the same run.
      - name: Backup rules — aapt2 vs built APK (cloud + d2d excluded)
        if: always()
        run: |
          cd titlan-android && ./gradlew --no-daemon :app:assembleDebug
          cd .. && ./scripts/check-backup-rules.sh
      # Evidence channel for every red/green run: the instrumented reports
      # are how predicted failure signatures get checked against reality.
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: androidTest-reports
          # HTML report plus the JUnit XML — both candidate XML locations
          # covered (AGP has moved this directory between versions; an empty
          # glob is harmless, a missing one costs the machine-readable
          # evidence).
          path: |
            titlan-android/app/build/reports/androidTests/**
            titlan-android/app/build/outputs/androidTest-results/connected/**
            titlan-android/app/build/test-results/connected/**
          retention-days: 30

  reproducible-build:
    name: Reproducible build — double build + diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y $PROTOC_APT
      - run: rustup toolchain install && rustup target add aarch64-linux-android x86_64-linux-android
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-ndk
      - run: sdkmanager "ndk;28.2.13676358"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - run: ./scripts/repro-build.sh
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: repro-report
          path: repro-report.txt
          retention-days: 30

  sbom:
    name: SBOM — CycloneDX (core, relay, APK deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y $PROTOC_APT
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-cyclonedx
      - run: cargo cyclonedx --format json
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew --no-daemon :app:cyclonedxDirectBom
        working-directory: titlan-android
      - name: Collect SBOMs
        run: |
          mkdir -p sbom
          cp tezca-core/tezca-core.cdx.json sbom/
          cp tezca-relay/tezca-relay.cdx.json sbom/
          cp titlan-android/app/build/reports/cyclonedx-direct/bom.json sbom/titlan-android-app.cdx.json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom-ci-validation
          path: sbom/
          retention-days: 14
