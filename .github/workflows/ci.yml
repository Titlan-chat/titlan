#
# CI per work order §6 Phase 1: build, clippy (deny warnings), rustfmt,
# cargo audit/deny, Android lint, unit tests, double-build reproducibility
# check, and SBOM generation (validated on every push; published as release
# artifacts by release.yml on tagged builds).

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  invariants:
    name: Repo invariants (SPDX, appId, naming)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-invariants.sh

  rust:
    name: Rust — fmt, clippy, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rustup reads the pinned toolchain from rust-toolchain.toml
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo build --workspace --locked
      - run: cargo test --workspace --locked

  rust-supply-chain:
    name: Rust — cargo deny + audit (INV-7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
      - uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  android:
    name: Android — lint, unit tests, assemble
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: titlan-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew --no-daemon :app:lintDebug :app:testDebugUnitTest :app:assembleDebug

  reproducible-build:
    name: Reproducible build — double build + diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./scripts/repro-build.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repro-report
          path: repro-report.txt
          retention-days: 30

  sbom:
    name: SBOM — CycloneDX (core, relay, APK deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: cargo-cyclonedx
      - run: cargo cyclonedx --format json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew --no-daemon :app:cyclonedxDirectBom
        working-directory: titlan-android
      - name: Collect SBOMs
        run: |
          mkdir -p sbom
          cp tezca-core/tezca-core.cdx.json sbom/
          cp tezca-relay/tezca-relay.cdx.json sbom/
          cp titlan-android/app/build/reports/cyclonedx-direct/bom.json sbom/titlan-android-app.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-ci-validation
          path: sbom/
          retention-days: 14
