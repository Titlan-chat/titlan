#
# INV-7 dependency hygiene: automated bump proposals, gated by the full CI
# matrix (including cargo deny/audit and the reproducible-build job).

version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: gradle
    directory: /titlan-android
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
