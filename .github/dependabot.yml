#
# INV-7 dependency hygiene: automated bump proposals, gated by the full CI
# matrix (including cargo deny/audit and the reproducible-build job).
#
# Updates are GROUPED per ecosystem into a single weekly PR so a week's bumps
# arrive as one reviewable, CI-gated unit instead of a PR stack.
#
# NOTE for any Gradle bump that changes resolved dependencies: Dependabot
# cannot regenerate our committed lockfiles. The merger must run
#   ./gradlew :app:assembleDebug :app:assembleRelease :app:lintDebug :app:testDebugUnitTest --write-locks
# and re-run scripts/repro-build.sh before merging (see docs/build.md).

version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      rust-dependencies:
        patterns: ["*"]
    ignore:
      # rand is pinned to libsignal's rand dependency: libsignal's APIs take
      # caller-supplied RNGs bound to rand 0.9 traits, so rand moves ONLY in
      # lockstep with a libsignal bump, verified against the RNG trait bounds
      # in identity/session key generation (tezca-core identity.rs/session.rs
      # compile + full test suite). Maintainer decision 2026-07-14 (PR #11).
      # NB: rand is 0.x — Dependabot calls 0.9→0.10 "semver-minor", hence
      # both entries; 0.9.x patches still flow.
      - dependency-name: "rand"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # libsignal bumps are maintainer-initiated, never automated: they move
      # in lockstep with rand (see above / work-order §10.2), must be
      # verified against the RNG trait bounds in identity/session key
      # generation, and require re-mirroring libsignal's [patch.crates-io]
      # table in our Cargo.toml — none of which a Dependabot PR performs.
      # Security advisories still surface via the cargo deny/audit CI job
      # (INV-6/INV-7). Maintainer decision 2026-07-16 (PR #16 closure).
      - dependency-name: "libsignal-protocol"

  - package-ecosystem: gradle
    directory: /titlan-android
    schedule:
      interval: weekly
      day: monday
    groups:
      android-dependencies:
        patterns: ["*"]
    ignore:
      # AGP 9.x requires Gradle >= 9.5, and Gradle >= 9.6 removed internal
      # APIs that AGP 8.x depends on (verified 2026-07-14 on PRs #2/#8).
      # The pair must move TOGETHER as a deliberate, maintainer-approved
      # toolchain migration — proposed for Phase 4 kickoff, before the real
      # UI lands. Remove both ignores when that migration is scheduled.
      - dependency-name: "com.android.application"
        update-types: ["version-update:semver-major"]
      - dependency-name: "gradle-wrapper"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]
